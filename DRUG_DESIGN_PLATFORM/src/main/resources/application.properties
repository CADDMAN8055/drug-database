# DrugCompass - Application Properties

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=DrugCompass

# Vaadin Configuration
vaadin.servlet.host=0.0.0.0
vaadin.servlet.port=8080
vaadin.launch-browser=true
vaadin.production-mode=false

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# Temporary Directory
java.io.tmpdir=/tmp/drugcompass

# Logging
logging.level.com.drugdesign=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.vaadin=INFO

# CDK Configuration
cdk.debug=false

# DeepLearning4j Configuration  
dl4j.backend=CPU
dl4j.num-threads=4

# Tool Paths (default)
tool.vina.path=/usr/bin/vina
tool.smina.path=/usr/local/bin/smina
tool.gromacs.path=/usr/bin/gmx
tool.python.path=python3

# API Endpoints
api.swissadme=https://www.swissadme.ch/index.php
api.pubchem=https://pubchem.ncbi.nlm.nih.gov/rest/pug

# Cache Settings
cache.enabled=true
cache.dir=${java.io.tmpdir}/drugcompass/cache
